name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked --extra dev
      - run: uv run --locked --extra dev ruff check --select F401,F841,E731 __init__.py src tests
      - run: uv run --locked --extra dev python -m compileall -q __init__.py src
      - run: uv run --locked --extra dev pytest --cov=src/self_ershov_memory --cov=__init__ --cov-report=term-missing --cov-report=xml --cov-fail-under=100 -q
      - run: uv run --locked --extra dev python -m build
      - run: uv run --locked --extra dev twine check --strict dist/*.whl dist/*.tar.gz
      - run: uv run --no-cache --no-project --isolated --with dist/*.whl self-ershov-memory --help
      - run: uv run --no-cache --no-project --isolated --with dist/*.tar.gz self-ershov-memory --help
