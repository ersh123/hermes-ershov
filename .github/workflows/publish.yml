name: Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev
      - run: uv run --locked --extra dev pytest --cov=src/self_ershov_memory --cov=__init__ --cov-report=term-missing --cov-fail-under=100 -q
      - run: uv run --locked --extra dev python -m build
      - run: uv run --locked --extra dev twine check --strict dist/*.whl dist/*.tar.gz
      - uses: actions/upload-artifact@v5
        with:
          name: python-package
          path: dist/*
          if-no-files-found: error
